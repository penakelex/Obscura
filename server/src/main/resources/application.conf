obscura {
  database {
    url = "jdbc:postgresql://localhost:5432/obscura_db"
    driver = "org.postgresql.Driver"
    user = ${?DB_USER}
    password = ${?DB_PASSWORD}
    auto-migrate = true
    pool-size = 10
    connection-timeout-seconds = 30
    max-lifetime-seconds = 1800
    log-sql = false
  }

  security {
    session {
      token-length-bytes = 32
      expiration-days = 30
      hash-algorithm = "SHA-256"
    }
    password {
      hash-length = 97
      algorithm = "Argon2id"
    }
    cipher {
      default-type = 1
    }
  }

  jobs {
    enabled = true
    session-cleanup-interval-hours = 24
  }

  server {
    host = "0.0.0.0"
    port = 8080
    grpc-port = 50051
  }
}
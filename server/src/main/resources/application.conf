obscura {
  database {
    url = ${?DB_URL}
    driver = "org.postgresql.Driver"
    user = ${?DB_USER}
    password = ${?DB_PASSWORD}
    auto-migrate = true
    pool-size = 10
    connection-timeout-seconds = 30
    max-lifetime-seconds = 1800
    log-sql = false
  }

  security {
    session {
      token-length-bytes = 32
      expiration-days = 30
      hash-algorithm = "SHA-256"
    }
    password {
      hash-length = 255
      algorithm = "Argon2id"
      hash-parameters {
        iterations = 3
        memory = 65536
        parallelism = 2
        output-length = 32
        log-rounds = 12
        work-factor = 16384
        resources = 8
        hmac-algorithm = "SHA512"
      }
    }
    rate-limit {
        max-requests = 10
        max-requests = ${?RATE_LIMIT_MAX_REQUESTS}
        window-minutes = 1
        window-minutes = ${?RATE_LIMIT_WINDOW_MINUTES}
      }
  }

  validation {
    email {
      max-length = 255
    }
    password {
      min-length = 8
      max-length = 128
    }
    device-info {
      max-length = 128
    }
  }

  jobs {
    enabled = true
    session-cleanup-interval-hours = 24
    notes-cleanup-interval-hours = 24
    notes-retention-days = 30
  }

  server {
    host = "0.0.0.0"
    port = 8080
    grpc-port = 50051
  }
}